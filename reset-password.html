<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true"></div>
  <div class="login-card army-card">
    <div class="login-header">
      <span class="login-badge">&#9733;</span>
      <h2 class="army-title">Reset Password</h2>
      <p class="army-subtitle">Generate or set a new password</p>
    </div>
    <form id="resetForm" class="login-form">
      <label class="army-label">User ID / Army ID</label>
      <input type="text" id="resetUserId" class="army-input" placeholder="e.g. ARMY1023" required>
      <label class="army-label">New Password</label>
      <input type="password" id="newPassword" class="army-input" placeholder="Enter new password" minlength="4">
      <p class="form-hint">Leave blank to auto-generate a password.</p>
      <button type="button" class="army-btn secondary btn-block" id="btnGenerate">Generate Password</button>
      <button type="submit" class="army-btn btn-block">Set Password</button>
    </form>
    <p class="form-footer"><a href="login.html">Back to Login</a></p>
  </div>
  <script src="data.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
