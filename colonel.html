<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Colonel Dashboard</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="theme-modules.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="security.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="dashboard module-colonel" data-rank="colonel">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
  <aside class="army-sidebar" id="sidebar">
    <div class="logo"><span class="icon">&#128081;</span><span>COLONEL</span></div>
    <nav class="nav-wrap">
      <a href="colonel.html" class="active"><span class="nav-icon">&#127968;</span><span>Dashboard</span></a>
      <a href="colonel-final-leave.html"><span class="nav-icon">&#128197;</span><span>Final Leave Approval</span></a>
      <a href="colonel-transfer-orders.html"><span class="nav-icon">&#128666;</span><span>Transfer Orders</span></a>
      <a href="#"><span class="nav-icon">&#9873;</span><span>Battalion Control</span></a>
    </nav>
    <a href="#" class="logout-link" onclick="logout(); return false;"><span class="nav-icon">&#128682;</span><span>Logout</span></a>
  </aside>
  <main class="army-main">
    <h1 class="page-title">Colonel Control Panel</h1>
    <p class="army-subtitle" style="margin-bottom:20px">Battalion-level command and oversight.</p>
    <div class="stats-grid" id="colStats">
      <div class="stat-card">
        <h2 class="counter" data-target="0" id="finalLeaves">0</h2>
        <p>Pending Final Leave</p>
      </div>
      <div class="stat-card">
        <h2 class="counter" data-target="0" id="finalTransfers">0</h2>
        <p>Pending Transfer Orders</p>
      </div>
      <div class="stat-card">
        <h2 class="counter" data-target="4">0</h2>
        <p>Active Battalions</p>
      </div>
    </div>
  </main>
  <script src="data.js"></script>
  <script src="dashboard.js"></script>
  <script>
    (function() {
      var fl = typeof getLeavesPendingFinal === "function" ? getLeavesPendingFinal().length : 0;
      var ft = typeof getTransfersPendingFinal === "function" ? getTransfersPendingFinal().length : 0;
      document.getElementById("finalLeaves").setAttribute("data-target", fl);
      document.getElementById("finalTransfers").setAttribute("data-target", ft);
    })();
  </script>
  <script src="logout.js"></script>
  <script>
    var t = document.getElementById('menuToggle');
    var s = document.getElementById('sidebar');
    if (t && s) t.addEventListener('click', function(){ s.classList.toggle('open'); });
  </script>
</body>
</html>
