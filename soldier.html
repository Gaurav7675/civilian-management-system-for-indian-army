<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soldier Dashboard</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="theme-modules.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="security.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="dashboard module-soldier" data-rank="soldier">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
  <aside class="army-sidebar" id="sidebar">
    <div class="logo"><span class="icon">&#128274;</span><span>SOLDIER</span></div>
    <nav class="nav-wrap">
      <a href="soldier.html" class="active"><span class="nav-icon">&#127968;</span><span>Dashboard</span></a>
      <a href="soldier-profile.html"><span class="nav-icon">&#128100;</span><span>Profile</span></a>
      <a href="soldier-battalion.html"><span class="nav-icon">&#9873;</span><span>Battalion</span></a>
      <a href="soldier-leave.html"><span class="nav-icon">&#128197;</span><span>Apply Leave</span></a>
      <a href="soldier-leave-status.html"><span class="nav-icon">&#128203;</span><span>Leave Status</span></a>
      <a href="soldier-salary.html"><span class="nav-icon">&#128176;</span><span>Salary Slip</span></a>
      <a href="soldier-transfer.html"><span class="nav-icon">&#128666;</span><span>Transfer</span></a>
    </nav>
    <a href="#" class="logout-link" onclick="logout(); return false;"><span class="nav-icon">&#128682;</span><span>Logout</span></a>
  </aside>
  <main class="army-main">
    <h1 class="page-title">Welcome, Soldier</h1>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <h2 class="counter" data-target="0" id="totalLeaves">0</h2>
        <p>Total Leaves</p>
      </div>
      <div class="stat-card">
        <h2 class="counter" data-target="0" id="pendingLeaves">0</h2>
        <p>Pending</p>
      </div>
    </div>
  </main>
  <script src="data.js"></script>
  <script src="dashboard.js"></script>
  <script src="logout.js"></script>
  <script>
    (function() {
      var cu = typeof getCurrentUserFromDB === 'function' ? getCurrentUserFromDB() : null;
      if (cu) {
        var leaves = typeof getLeavesByUser === 'function' ? getLeavesByUser(cu.id) : [];
        document.getElementById('totalLeaves').setAttribute('data-target', leaves.length);
        document.getElementById('pendingLeaves').setAttribute('data-target', leaves.filter(function(l){ return l.status === 'Pending'; }).length);
      }
      var t = document.getElementById('menuToggle');
      var s = document.getElementById('sidebar');
      if (t && s) t.addEventListener('click', function(){ s.classList.toggle('open'); });
    })();
  </script>
</body>
</html>
