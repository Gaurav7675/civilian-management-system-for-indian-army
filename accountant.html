<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accountant Dashboard</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="theme-modules.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="security.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="dashboard module-accountant" data-rank="accountant">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
  <aside class="army-sidebar" id="sidebar">
    <div class="logo"><span class="icon">&#128176;</span><span>ACCOUNTANT</span></div>
    <nav class="nav-wrap">
      <a href="accountant.html" class="active"><span class="nav-icon">&#127968;</span><span>Dashboard</span></a>
      <a href="accountant-salary-structure.html"><span class="nav-icon">&#128178;</span><span>Salary Structure</span></a>
      <a href="accountant-generate-salary.html"><span class="nav-icon">&#128176;</span><span>Generate Salary</span></a>
      <a href="accountant-salary-history.html"><span class="nav-icon">&#128200;</span><span>Salary History</span></a>
    </nav>
    <a href="#" class="logout-link" onclick="logout(); return false;"><span class="nav-icon">&#128682;</span><span>Logout</span></a>
  </aside>
  <main class="army-main">
    <h1 class="page-title">Finance Dashboard</h1>
    <p class="army-subtitle" style="margin-bottom:20px">Payroll and financial oversight.</p>
    <div class="stats-grid" id="accStats">
      <div class="stat-card">
        <h2 class="counter" data-target="0" id="salariesCount">0</h2>
        <p>Salaries Processed</p>
      </div>
      <div class="stat-card">
        <h2 class="counter" data-target="0" id="usersCount">0</h2>
        <p>Employees</p>
      </div>
    </div>
  </main>
  <script src="data.js"></script>
  <script src="dashboard.js"></script>
  <script>
    (function() {
      var sal = typeof getAllSalaries === "function" ? getAllSalaries().length : 0;
      var us = typeof DB !== "undefined" ? DB.users.filter(function(u){ return u.role === "soldier"; }).length : 0;
      document.getElementById("salariesCount").setAttribute("data-target", sal);
      document.getElementById("usersCount").setAttribute("data-target", us);
    })();
  </script>
  <script src="logout.js"></script>
  <script>
    var t = document.getElementById('menuToggle');
    var s = document.getElementById('sidebar');
    if (t && s) t.addEventListener('click', function(){ s.classList.toggle('open'); });
  </script>
</body>
</html>
