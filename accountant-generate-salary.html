<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generate Salary</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="theme-modules.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="soldier1.css">
  <script src="security.js"></script>
  <script src="auth.js"></script>
</head>
<body class="dashboard module-accountant" data-rank="accountant">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
  <aside class="army-sidebar" id="sidebar">
    <div class="logo"><span class="icon">&#128176;</span><span>ACCOUNTANT</span></div>
    <nav class="nav-wrap">
      <a href="accountant.html"><span class="nav-icon">&#127968;</span><span>Dashboard</span></a>
      <a href="accountant-salary-structure.html"><span class="nav-icon">&#128178;</span><span>Salary Structure</span></a>
      <a href="accountant-generate-salary.html" class="active"><span class="nav-icon">&#128176;</span><span>Generate Salary</span></a>
      <a href="accountant-salary-history.html"><span class="nav-icon">&#128200;</span><span>Salary History</span></a>
    </nav>
    <a href="#" class="logout-link" onclick="logout(); return false;"><span class="nav-icon">&#128682;</span><span>Logout</span></a>
  </aside>
  <main class="army-main">
    <h1 class="page-title">Generate Salary Slip</h1>
    <p class="army-subtitle" style="margin-bottom:20px">Calculate and generate monthly salary slip</p>
    <form class="leave-form army-card" id="genSalaryForm" style="max-width:480px">
      <label class="army-label">Employee (Soldier)</label>
      <select id="empSelect" class="army-input" required></select>
      <label class="army-label">Month</label>
      <input type="text" id="month" class="army-input" placeholder="e.g. April 2026" required>
      <label class="army-label">Deductions (&#8377;)</label>
      <input type="number" id="deductions" class="army-input" value="0" min="0" step="100">
      <p class="form-hint">Net = Basic + DA + HRA + Allowances - Deductions (auto from structure)</p>
      <div id="preview" class="slip-preview"></div>
      <button type="submit" class="army-btn btn-block">Generate &amp; Save Slip</button>
    </form>
  </main>
  <script src="data.js"></script>
  <script src="accountant-generate-salary.js"></script>
  <script>var t=document.getElementById('menuToggle');var s=document.getElementById('sidebar');if(t&&s)t.addEventListener('click',function(){s.classList.toggle('open');});</script>
</body>
</html>
